# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: call-apim-with-managed-identity
metadata:
  template: tdd-call-apim-with-managed-identity@1.8.1
hooks:
  predown:
    - shell: pwsh
      run: ./hooks/predown-remove-app-registrations.ps1
      interactive: true
services:
  functionApp:
    project: ./src/functionApp/FunctionApp
    host: function
    language: csharp
  logicApp:
    project: ./src/logicApp
    dist: Workflows
    host: function
    language: js # Logic Apps aren't natively supported by azd yet. By using js, the logic app will be zipped and deployed.
requiredVersions:
  azd: ">= 1.23.15" # azd version 1.23.15 or higher is required because we're using features from Bicep 0.42.1.
